# Local Model Provider Configuration
# Copy and customize: cp local.example.yaml local.yaml
#
# Requires: pip install llama-cpp-python
# Download GGUF models from https://huggingface.co
# Recommended: 7B+ parameter models for reasonable gomoku play

provider: local

# Path to GGUF model file (supports ~ for home directory)
model_path: ~/models/qwen2.5-7b-instruct.Q4_K_M.gguf

# Context window size
n_ctx: 4096

# GPU layers (-1 = all layers on GPU, 0 = CPU only)
n_gpu_layers: -1

temperature: 0.3
max_history_turns: 10
response_format: json
